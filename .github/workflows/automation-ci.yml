name: QA Automation CI - Build Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Build Docker image
        run: |
          docker build -t qa-automation-360-applitools-demo .

      - name: Validate Robot Framework structure with dryrun
        run: |
          docker run --rm qa-automation-360-applitools-demo \
            python -m robot --dryrun -d results tests/

      - name: Create artifact folders
        if: always()
        run: |
          mkdir -p results
          mkdir -p evidence

      - name: Upload Robot Framework validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-validation-results
          path: |
            results/
          if-no-files-found: ignore